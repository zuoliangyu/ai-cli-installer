name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag (e.g. v0.0.1). Required for manual run.'
        required: true

# Concurrency: only one release per tag in flight
concurrency:
  group: release-${{ github.ref || github.event.inputs.tag }}
  cancel-in-progress: false

env:
  DIST_REPO: zuoliangyu/ai-cli-installer-dist

jobs:
  prepare:
    name: Prepare release on dist repo
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve tag
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create draft release on ${{ env.DIST_REPO }}
        env:
          GH_TOKEN: ${{ secrets.DIST_REPO_PAT }}
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          # If a release for this tag already exists, just leave it; otherwise create draft.
          if ! gh release view "$TAG" --repo "$DIST_REPO" >/dev/null 2>&1; then
            # --target main is required so the publish step's `--latest` can
            # bind the tag to a real commit. Otherwise GH rejects with HTTP 422
            # "Repository is empty" (or "tag_name is not a valid tag").
            gh release create "$TAG" \
              --repo "$DIST_REPO" \
              --title "$TAG" \
              --notes "Automated build of $TAG" \
              --target main \
              --draft
          fi

  build:
    name: Build (${{ matrix.os }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            tauri_args: ''
          - os: windows-latest
            tauri_args: ''
          - os: macos-latest
            tauri_args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Build with tauri-action
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.tauri_args }}
          includeUpdaterJson: true
          # Empty tagName / releaseId → tauri-action does NOT create or upload to release.
          # We handle cross-repo upload below with gh CLI.
          tagName: ''

      - name: Upload artifacts to dist repo
        env:
          GH_TOKEN: ${{ secrets.DIST_REPO_PAT }}
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          PATHS='${{ steps.tauri.outputs.artifactPaths }}'
          # tr -d '\r' is critical on Windows runners (git-bash) — jq output
          # passing through pipes inherits CRLF, and `read -r` does not strip CR.
          echo "$PATHS" | jq -r '.[]' | tr -d '\r' | while IFS= read -r f; do
            # Skip macOS .app bundles — they're directories, not single files.
            # The corresponding .app.tar.gz is the actual updater artifact.
            if [ -d "$f" ]; then
              echo "skip dir: $f"
              continue
            fi
            # Normalize Windows backslashes — gh CLI accepts forward slashes on Win.
            f="${f//\\//}"
            echo "uploading: $f"
            gh release upload "$TAG" "$f" --repo "$DIST_REPO" --clobber
          done

      # tauri-action filters .nsis.zip / .msi.zip out of artifactPaths when
      # tagName is empty. But the Tauri updater on Windows downloads the .zip
      # variant (not the raw .exe/.msi) to atomically replace a running app.
      # So we have to upload them ourselves. Use find — bash globs + nullglob
      # behaved unreliably on the Windows git-bash runner.
      - name: Upload Windows updater bundles
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.DIST_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          BUNDLE="src-tauri/target/release/bundle"
          echo "scanning $BUNDLE for updater zip bundles…"
          mapfile -t files < <(find "$BUNDLE" -type f \
            \( -name '*.nsis.zip' -o -name '*.nsis.zip.sig' \
               -o -name '*.msi.zip' -o -name '*.msi.zip.sig' \) 2>/dev/null)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "  no zip bundles found — listing $BUNDLE for diagnosis:"
            find "$BUNDLE" -type f 2>/dev/null | head -40
            exit 1
          fi
          for f in "${files[@]}"; do
            f="${f//\\//}"
            echo "uploading: $f"
            gh release upload "$TAG" "$f" --repo "$DIST_REPO" --clobber
          done

  generate-latest:
    name: Generate latest.json
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Build and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.DIST_REPO_PAT }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${TAG#v}"
          tmp=$(mktemp -d)
          cd "$tmp"

          # Pull the .sig files we need from the just-uploaded release.
          gh release download "$TAG" --repo "$DIST_REPO" \
            -p '*.sig' || true

          ls -la

          # Read signatures (each .sig is a single-line minisign blob).
          read_sig() {
            local pattern="$1"
            local f
            f=$(ls $pattern 2>/dev/null | head -1)
            [ -n "$f" ] && cat "$f" || echo ""
          }

          WIN_SIG=$(read_sig "*_x64-setup.nsis.zip.sig")
          DARWIN_SIG=$(read_sig "*.app.tar.gz.sig")
          LINUX_SIG=$(read_sig "*_amd64.AppImage.sig")

          if [ -z "$WIN_SIG" ] || [ -z "$DARWIN_SIG" ] || [ -z "$LINUX_SIG" ]; then
            echo "WARNING: at least one platform missing signature"
            echo "  win=${#WIN_SIG} darwin=${#DARWIN_SIG} linux=${#LINUX_SIG}"
          fi

          URL_BASE="https://github.com/$DIST_REPO/releases/download/$TAG"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # jq handles JSON escaping correctly (signatures contain newlines).
          jq -n \
            --arg version "$VERSION" \
            --arg notes "Release v$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg win_sig "$WIN_SIG" \
            --arg win_url "$URL_BASE/AI.CLI.Installer_${VERSION}_x64-setup.nsis.zip" \
            --arg darwin_sig "$DARWIN_SIG" \
            --arg darwin_url "$URL_BASE/AI.CLI.Installer.app.tar.gz" \
            --arg linux_sig "$LINUX_SIG" \
            --arg linux_url "$URL_BASE/AI.CLI.Installer_${VERSION}_amd64.AppImage" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "darwin-aarch64": { signature: $darwin_sig, url: $darwin_url },
                "linux-x86_64":   { signature: $linux_sig, url: $linux_url }
              }
            }' > latest.json

          echo "=== latest.json ==="
          cat latest.json

          gh release upload "$TAG" latest.json --repo "$DIST_REPO" --clobber

  publish:
    name: Publish release
    needs: [prepare, build, generate-latest]
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as non-draft
        env:
          GH_TOKEN: ${{ secrets.DIST_REPO_PAT }}
        run: |
          gh release edit "${{ needs.prepare.outputs.tag }}" \
            --repo "$DIST_REPO" \
            --draft=false \
            --latest
