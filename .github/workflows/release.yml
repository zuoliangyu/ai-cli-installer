name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag (e.g. v0.0.1). Required for manual run.'
        required: true

# Concurrency: only one release per tag in flight
concurrency:
  group: release-${{ github.ref || github.event.inputs.tag }}
  cancel-in-progress: false

env:
  DIST_REPO: zuoliangyu/ai-cli-installer-dist

jobs:
  prepare:
    name: Prepare release on dist repo
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve tag
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create draft release on ${{ env.DIST_REPO }}
        env:
          GH_TOKEN: ${{ secrets.DIST_REPO_PAT }}
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          # If a release for this tag already exists, just leave it; otherwise create draft.
          if ! gh release view "$TAG" --repo "$DIST_REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$DIST_REPO" \
              --title "$TAG" \
              --notes "Automated build of $TAG" \
              --draft
          fi

  build:
    name: Build (${{ matrix.os }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            tauri_args: ''
          - os: windows-latest
            tauri_args: ''
          - os: macos-latest
            tauri_args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Build with tauri-action
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.tauri_args }}
          includeUpdaterJson: true
          # Empty tagName / releaseId → tauri-action does NOT create or upload to release.
          # We handle cross-repo upload below with gh CLI.
          tagName: ''

      - name: Upload artifacts to dist repo
        env:
          GH_TOKEN: ${{ secrets.DIST_REPO_PAT }}
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          PATHS='${{ steps.tauri.outputs.artifactPaths }}'
          echo "$PATHS" | jq -r '.[]' | while IFS= read -r f; do
            echo "uploading: $f"
            gh release upload "$TAG" "$f" --repo "$DIST_REPO" --clobber
          done

  publish:
    name: Publish release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as non-draft
        env:
          GH_TOKEN: ${{ secrets.DIST_REPO_PAT }}
        run: |
          gh release edit "${{ needs.prepare.outputs.tag }}" \
            --repo "$DIST_REPO" \
            --draft=false \
            --latest
