name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag (e.g. v0.0.7). Required for manual run.'
        required: true

# Concurrency: only one release per tag in flight
concurrency:
  group: release-${{ github.ref || github.event.inputs.tag }}
  cancel-in-progress: false

# GITHUB_TOKEN needs explicit write permission for `gh release` to work.
permissions:
  contents: write

jobs:
  prepare:
    name: Prepare draft release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          VERSION="${TAG#v}"
          # Extract the section between "## [VERSION]" and the next "## "
          # (exclusive). Use string `index()` instead of regex — more portable
          # across awk implementations (gawk warns on \[ \] escapes).
          awk -v ver="$VERSION" '
            /^## / {
              if (capture) { exit }
              if (index($0, "## [" ver "]") > 0) { capture=1; next }
            }
            capture { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          # Trim leading blank lines
          sed -i '/./,$!d' /tmp/release-notes.md
          # Fallback to generic note if extraction yielded nothing
          if [ ! -s /tmp/release-notes.md ]; then
            echo "Automated build of $TAG. See CHANGELOG.md for details." > /tmp/release-notes.md
            echo "fallback used (no [$VERSION] section in CHANGELOG)"
          fi
          echo "--- release notes ---"
          cat /tmp/release-notes.md
          echo "---------------------"

      - name: Create draft release (if not exists)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md \
              --target main \
              --draft
          else
            # Release already exists (re-run scenario) — refresh notes from CHANGELOG
            gh release edit "$TAG" \
              --repo "${{ github.repository }}" \
              --notes-file /tmp/release-notes.md
          fi

  build:
    name: Build (${{ matrix.os }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            tauri_args: ''
          - os: windows-latest
            tauri_args: ''
          - os: macos-latest
            tauri_args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend deps
        run: npm ci

      - name: Build with tauri-action
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.tauri_args }}
          includeUpdaterJson: false
          # Don't let tauri-action create / upload to release; we manage it
          # ourselves so generate-latest can compose a merged latest.json.
          tagName: ''

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          PATHS='${{ steps.tauri.outputs.artifactPaths }}'
          # Strip CR (Windows git-bash) and skip dirs (.app bundles).
          echo "$PATHS" | jq -r '.[]' | tr -d '\r' | while IFS= read -r f; do
            if [ -d "$f" ]; then
              echo "skip dir: $f"
              continue
            fi
            f="${f//\\//}"
            echo "uploading: $f"
            gh release upload "$TAG" "$f" --repo "${{ github.repository }}" --clobber
          done

  generate-latest:
    name: Generate latest.json
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Build and upload latest.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${TAG#v}"
          tmp=$(mktemp -d)
          cd "$tmp"

          gh release download "$TAG" --repo "${{ github.repository }}" \
            -p '*.sig' || true
          ls -la

          read_sig() {
            local pattern="$1"
            local f
            f=$(ls $pattern 2>/dev/null | head -1)
            [ -n "$f" ] && cat "$f" || echo ""
          }

          # Tauri v2 updater on Windows downloads NSIS installer directly,
          # verifies via .exe.sig — no .zip wrapper needed.
          WIN_SIG=$(read_sig "*_x64-setup.exe.sig")
          DARWIN_SIG=$(read_sig "*.app.tar.gz.sig")
          LINUX_SIG=$(read_sig "*_amd64.AppImage.sig")

          if [ -z "$WIN_SIG" ] || [ -z "$DARWIN_SIG" ] || [ -z "$LINUX_SIG" ]; then
            echo "WARNING: missing sig (win=${#WIN_SIG} darwin=${#DARWIN_SIG} linux=${#LINUX_SIG})"
          fi

          URL_BASE="https://github.com/${{ github.repository }}/releases/download/$TAG"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq -n \
            --arg version "$VERSION" \
            --arg notes "Release v$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg win_sig "$WIN_SIG" \
            --arg win_url "$URL_BASE/AI.CLI.Installer_${VERSION}_x64-setup.exe" \
            --arg darwin_sig "$DARWIN_SIG" \
            --arg darwin_url "$URL_BASE/AI.CLI.Installer.app.tar.gz" \
            --arg linux_sig "$LINUX_SIG" \
            --arg linux_url "$URL_BASE/AI.CLI.Installer_${VERSION}_amd64.AppImage" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $win_sig, url: $win_url },
                "darwin-aarch64": { signature: $darwin_sig, url: $darwin_url },
                "linux-x86_64":   { signature: $linux_sig, url: $linux_url }
              }
            }' > latest.json

          echo "=== latest.json ==="
          cat latest.json

          gh release upload "$TAG" latest.json --repo "${{ github.repository }}" --clobber

  publish:
    name: Publish release
    needs: [prepare, build, generate-latest]
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as non-draft + latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ needs.prepare.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --latest
